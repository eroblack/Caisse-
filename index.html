<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diksyonè Kreyòl ↔ Español PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
font-size:32px;
color:#00ffff;
text-shadow:0 0 10px cyan;
}

.search-box{
width:100%;
max-width:700px;
margin:auto;
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:15px;
border:none;
border-radius:15px;
outline:none;
font-size:18px;
background:#111827;
color:white;
box-shadow:0 0 10px #00ffff55;
}

.dictionary{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.words-list,
.learned-list{
background:#111827;
border-radius:20px;
padding:15px;
height:70vh;
overflow-y:auto;
box-shadow:0 0 20px #00ffff22;
}

.word{
padding:12px;
margin-bottom:10px;
background:#1e293b;
border-radius:12px;
cursor:pointer;
transition:0.3s;
font-size:18px;
}

.word:hover{
background:#00ffff;
color:black;
transform:scale(1.03);
}

.definition{
background:#111827;
border-radius:20px;
padding:20px;
box-shadow:0 0 20px #00ffff22;
}

.definition h2{
color:#00ffff;
margin-bottom:15px;
}

.definition p{
font-size:20px;
line-height:1.7;
}

.meaning-box{
margin-top:20px;
padding:15px;
background:#1e293b;
border-radius:15px;
}

button{
padding:12px 18px;
margin-top:10px;
margin-right:10px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:0.3s;
}

.speak-btn{
background:#00ffff;
color:black;
}

.save-btn{
background:#22c55e;
color:white;
}

.delete-btn{
background:#ef4444;
color:white;
}

.section-title{
margin-bottom:15px;
color:#00ffff;
font-size:22px;
}

.empty{
opacity:0.7;
text-align:center;
margin-top:20px;
}

@media(max-width:900px){

.dictionary{
grid-template-columns:1fr;
}

.words-list,
.learned-list{
height:300px;
}

}

</style>
</head>
<body>

<h1>📘 Diksyonè Kreyòl → Español PRO</h1>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Chèche yon mo...">
</div>

<div class="dictionary">

<!-- MO YO -->
<div class="words-list">

<h2 class="section-title">📚 Tout Mo</h2>

<div id="wordsList"></div>

</div>

<!-- DEFINISYON -->
<div class="definition">

<h2>📖 Definisyon</h2>

<div class="meaning-box">

<p id="meaning">
Klike sou yon mo pou wè tradiksyon ak definisyon li.
</p>

<div id="buttons"></div>

</div>

</div>

<!-- MO APRENN -->
<div class="learned-list">

<h2 class="section-title">⭐ Mo Mwen Aprann</h2>

<div id="savedWords"></div>

</div>

</div>

<script>

const dictionary = [

{
kreyol:"Bonjou",
espanol:"Hola",
definition:"Yo itilize mo sa pou salye yon moun nan maten oswa lajounen."
},

{
kreyol:"Mèsi",
espanol:"Gracias",
definition:"Mo pou remèsye yon moun."
},

{
kreyol:"Dlo",
espanol:"Agua",
definition:"Likid moun bwè pou viv."
},

{
kreyol:"Manje",
espanol:"Comida",
definition:"Tout bagay moun manje."
},

{
kreyol:"Kay",
espanol:"Casa",
definition:"Kote yon moun rete."
},

{
kreyol:"Lekòl",
espanol:"Escuela",
definition:"Kote elèv aprann."
},

{
kreyol:"Lanmou",
espanol:"Amor",
definition:"Santiman afeksyon pou yon moun."
},

{
kreyol:"Travay",
espanol:"Trabajo",
definition:"Aktivite moun fè pou touche lajan."
},

{
kreyol:"Papa",
espanol:"Padre",
definition:"Pè yon timoun."
},

{
kreyol:"Manman",
espanol:"Madre",
definition:"Mè yon timoun."
},

{
kreyol:"Zanmi",
espanol:"Amigo",
definition:"Yon moun ou gen bon relasyon avè l."
},

{
kreyol:"Dòmi",
espanol:"Dormir",
definition:"Repo kò ak lespri."
},

{
kreyol:"Pale",
espanol:"Hablar",
definition:"Kominike ak bouch."
},

{
kreyol:"Machin",
espanol:"Coche",
definition:"Veyikil pou deplase."
},

{
kreyol:"Lajan",
espanol:"Dinero",
definition:"Sa moun itilize pou achte bagay."
}

];

const wordsList = document.getElementById("wordsList");
const meaning = document.getElementById("meaning");
const buttons = document.getElementById("buttons");
const searchInput = document.getElementById("searchInput");
const savedWordsDiv = document.getElementById("savedWords");

let savedWords = JSON.parse(localStorage.getItem("savedWords")) || [];

function displayWords(words){

wordsList.innerHTML="";

words.forEach(word=>{

const div=document.createElement("div");

div.className="word";

div.innerHTML=`${word.kreyol}`;

div.onclick=()=>{

showMeaning(word);

};

wordsList.appendChild(div);

});

}

function showMeaning(word){

meaning.innerHTML=`

<b>🇭🇹 Kreyòl:</b> ${word.kreyol}<br><br>

<b>🇪🇸 Español:</b> ${word.espanol}<br><br>

<b>📘 Definisyon:</b><br>
${word.definition}

`;

buttons.innerHTML=`

<button class="speak-btn" onclick="speakWord('${word.espanol}')">
🔊 Tande Son
</button>

<button class="save-btn" onclick='saveWord(${JSON.stringify(word)})'>
⭐ Save Mo
</button>

`;

}

function speakWord(text){

if('speechSynthesis' in window){

const speech = new SpeechSynthesisUtterance(text);

speech.lang = "es-ES";

speech.rate = 0.9;

window.speechSynthesis.speak(speech);

}else{

alert("Telefòn ou pa sipòte son.");

}

}

function saveWord(word){

const exists = savedWords.find(w=>w.kreyol===word.kreyol);

if(!exists){

savedWords.push(word);

localStorage.setItem("savedWords", JSON.stringify(savedWords));

displaySavedWords();

alert("Mo a save!");

}else{

alert("Mo sa deja save.");

}

}

function displaySavedWords(){

savedWordsDiv.innerHTML="";

if(savedWords.length===0){

savedWordsDiv.innerHTML=`
<p class="empty">
Pa gen mo save pou kounye a.
</p>
`;

return;

}

savedWords.forEach((word,index)=>{

const div=document.createElement("div");

div.className="word";

div.innerHTML=`

<b>${word.kreyol}</b>
<br>
🇪🇸 ${word.espanol}

<br><br>

<button class="speak-btn" onclick="speakWord('${word.espanol}')">
🔊
</button>

<button class="delete-btn" onclick="deleteWord(${index})">
🗑
</button>

`;

savedWordsDiv.appendChild(div);

});

}

function deleteWord(index){

savedWords.splice(index,1);

localStorage.setItem("savedWords", JSON.stringify(savedWords));

displaySavedWords();

}

displayWords(dictionary);

displaySavedWords();

searchInput.addEventListener("keyup",()=>{

const value=searchInput.value.toLowerCase();

const filtered=dictionary.filter(word=>

word.kreyol.toLowerCase().includes(value) ||

word.espanol.toLowerCase().includes(value)

);

displayWords(filtered);

});

</script>

</body>
</html>
