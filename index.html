<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Bank Ayiti</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; text-align: center; }
        .user-card { border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 5px; display: flex; align-items: center; }
        .user-card img { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; }
        .balance { font-weight: bold; color: green; }
        .actions { margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #3498db; color: white; border: none; cursor: pointer; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <h1>E-Bank Digital</h1>
    
    <div id="users-list">
        <h2>Lis Kliyan yo</h2>
        <script>
            const users = [
                {id: 1, name: "Mwen (Itilizatè)", balance: 100, pass: "12345678", img: "https://via.placeholder.com/50"},
                {id: 2, name: "Jean Pierre", balance: 100, pass: "1111", img: "https://via.placeholder.com/50"},
                {id: 3, name: "Marie Noel", balance: 100, pass: "2222", img: "https://via.placeholder.com/50"},
                {id: 4, name: "Paul Saint", balance: 100, pass: "3333", img: "https://via.placeholder.com/50"},
                {id: 5, name: "Lucia Bel", balance: 100, pass: "4444", img: "https://via.placeholder.com/50"},
                {id: 6, name: "Marc Louis", balance: 100, pass: "5555", img: "https://via.placeholder.com/50"},
                {id: 7, name: "Rose Anna", balance: 100, pass: "6666", img: "https://via.placeholder.com/50"},
                {id: 8, name: "Pierre J", balance: 100, pass: "7777", img: "https://via.placeholder.com/50"},
                {id: 9, name: "Katia M", balance: 100, pass: "8888", img: "https://via.placeholder.com/50"},
                {id: 10, name: "Dony B", balance: 100, pass: "9999", img: "https://via.placeholder.com/50"}
            ];

            users.forEach(u => {
                document.write(`<div class="user-card">
                    <img src="${u.img}" alt="foto">
                    <div>
                        <strong>${u.name}</strong><br>
                        Balans: <span class="balance">${u.balance} Goud</span>
                    </div>
                </div>`);
            });
        </script>
    </div>

    <div class="actions">
        <h2>Fè yon tranzaksyon</h2>
        <input type="text" id="loginPass" placeholder="Antre modpas ou (12345678)">
        <input type="text" id="recipient" placeholder="Non moun k ap resevwa lajan an">
        <input type="number" id="amount" placeholder="Kantite Goud">
        <button onclick="transfer()">Voye Lajan</button>
    </div>

    <div id="receipt" style="margin-top: 20px; padding: 10px; background: #e8f6f3; display:none;">
        <h3>Detay Resi</h3>
        <p id="receipt-msg"></p>
    </div>
</div>

<script>
    function transfer() {
        let pass = document.getElementById('loginPass').value;
        let amount = document.getElementById('amount').value;
        let recipient = document.getElementById('recipient').value;

        if (pass === "12345678") {
            document.getElementById('receipt').style.display = 'block';
            document.getElementById('receipt-msg').innerText = 
                `Siksè! Ou voye ${amount} Goud bay ${recipient}.`;
        } else {
            alert("Modpas pa kòrèk!");
        }
    }
</script>

</body>
</html>
